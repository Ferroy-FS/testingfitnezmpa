# ══════════════════════════════════════════════════════════════
#  Nginx Configuration — FitNez (Laravel + Vue.js)
# ══════════════════════════════════════════════════════════════
#
# Lapisan Keamanan (poin b.1):
# - HTTP → redirect ke HTTPS (production)
# - HTTPS (SSL/TLS) untuk enkripsi transmisi data
# - Header keamanan tambahan (XSS Protection, Content-Type, dll)
# ══════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect (aktifkan di production) ──
# server {
#     listen 80;
#     server_name fitnez.local;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;                   # Aktifkan untuk HTTPS
    server_name fitnez.local;

    # ── SSL/TLS Configuration (aktifkan di production) ──
    # ssl_certificate     /etc/ssl/certs/fitnez.crt;
    # ssl_certificate_key /etc/ssl/private/fitnez.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    root /var/www/fitnez/public;
    index index.php index.html;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # HTTPS only

    # ── API → Laravel PHP-FPM ──
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Long Polling (timeout lebih lama) ──
    location /api/notifications/poll {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_read_timeout 60;
    }

    # ── PHP-FPM ──
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # ── Vue.js SPA (frontend) ──
    # Semua route non-API diarahkan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny access ke dotfiles ──
    location ~ /\. {
        deny all;
    }
}
